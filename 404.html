<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirecting...</title>
<script>
var l=window.location;
if(l.pathname==='/dental-hr-poc/404.html'){l.replace(l.origin+'/dental-hr-poc/');}
else{l.replace(l.origin+'/dental-hr-poc/'+l.pathname.slice(l.pathname.indexOf('/',1)+1)+l.search);}
</script>
</head>
<body></body>
</html>
