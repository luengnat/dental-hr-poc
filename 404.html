<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    /* GitHub Pages SPA redirect — save the deep-link path, then go to root */
    sessionStorage.redirect = location.href;
    var seg = 1;
    location.replace(
      location.protocol + '//' + location.hostname +
      location.pathname.split('/').slice(0, 1 + seg).join('/') + '/'
    );
  </script>
</head>
<body></body>
</html>
