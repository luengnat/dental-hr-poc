    <script>
      // GitHub Pages SPA route recovery
      (function() {
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          l.pathname = decoded + l.hash;
          history.replaceState(null, null, l.pathname + l.hash);
        }
      })();
